# Gemini AI Configuration (Local Override)
# Using Google AI Studio API (simpler than Vertex AI)
# Default: Uses hardcoded key if .env doesn't have GEMINI_API_KEY
spring:
  ai:
    google:
      genai:
        api-key: ${GEMINI_API_KEY:AIzaSyD-rJ5QpdR9gBOYUrftYvp067es2ECDyIE}
        chat:
          options:
            model: gemini-2.5-flash
            temperature: 0.7
            max-tokens: 2048
        embedding:
          options:
            model: gemini-embedding-001
            output-dimensionality: 768
