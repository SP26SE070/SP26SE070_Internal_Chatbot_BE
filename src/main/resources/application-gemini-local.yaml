# Gemini AI Configuration (Local Override)
# Using Google AI Studio API (simpler than Vertex AI)
# Set GEMINI_API_KEY in .env (see .env.example)
spring:
  ai:
    google:
      genai:
        # Optional at startup: app can run without Gemini key.
        # AI endpoints/features will return clear error when key is missing.
        api-key: ${GEMINI_API_KEY:}
        chat:
          options:
            model: gemini-2.5-flash
            temperature: 0.7
            max-tokens: 2048
        embedding:
          options:
            model: gemini-embedding-001
            output-dimensionality: 768
