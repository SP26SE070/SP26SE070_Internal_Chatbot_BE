# RAG Configuration
rag:
  chunk-size: 500  # Max tokens per chunk
  chunk-overlap: 50  # Overlap between chunks
  top-k: 5  # Number of similar chunks to retrieve
  embedding-batch-size: 10  # Process 10 documents at a time