# Gemini AI Configuration
# Copy file này thành application-gemini-local.yaml và thay YOUR_API_KEY
# Get API key: https://aistudio.google.com/app/apikey

spring:
  ai:
    vertex:
      ai:
        gemini:
          project-id: YOUR_PROJECT_ID  # Optional, có thể để trống nếu dùng API key
          location: us-central1
          chat:
            options:
              model: gemini-2.0-flash  # Fast & cheap
              temperature: 0.7
              max-tokens: 2048
          embedding:
            options:
              model: text-embedding-004  # 768 dimensions
              task-type: RETRIEVAL_DOCUMENT

