# SePay Configuration
sepay:
  # API Token từ SePay Dashboard (Menu: Cài đặt → API Token)
  api-token: ${SEPAY_API_TOKEN:PUURCPKXRQXZM66D8GGCGBHBODS7TRMYLLDF5JBMZZB5QP3JQIVSWU7RKTCVIAWL}
  
  # Webhook Secret từ SePay Dashboard (SePay dùng API Token để xác thực)
  webhook-secret: ${SEPAY_WEBHOOK_SECRET:PUURCPKXRQXZM66D8GGCGBHBODS7TRMYLLDF5JBMZZB5QP3JQIVSWU7RKTCVIAWL}
  
  # API Base URL (Production)
  base-url: https://my.sepay.vn/userapi
  
  # Bank Account Info (Tài khoản ngân hàng nhận tiền của bạn)
  bank:
    account-number: ${SEPAY_BANK_ACCOUNT:02317500402}
    account-name: ${SEPAY_BANK_NAME:PHAM HONG QUAN}
    bank-code: ${SEPAY_BANK_CODE:TPB}
    bank-name: ${SEPAY_BANK_DISPLAY_NAME:TPBANK}
  
  # Transaction Settings
  transaction:
    prefix: "THANHTOAN"          # Prefix cho transaction content
    renewal-prefix: "RENEWAL"    # Prefix cho auto-renewal
    timeout-minutes: 30          # Payment timeout (30 phút)
    polling-interval-seconds: 5  # Frontend polling interval
  
  # Cron Job Schedules (Auto-renewal)
  cron:
    renewal-reminder: "0 0 8 * * *"   # 8:00 AM daily - Gửi email nhắc nhở
    process-renewals: "0 0 1 * * *"   # 1:00 AM daily - Xử lý gia hạn
    check-expired: "0 0 2 * * *"      # 2:00 AM daily - Check hết hạn

# =====================================================
# LƯU Ý: Tạo file .env ở root project với nội dung:
# =====================================================
# SEPAY_API_TOKEN=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
# SEPAY_WEBHOOK_SECRET=your-webhook-secret-key
# SEPAY_BANK_ACCOUNT=1234567890
# SEPAY_BANK_NAME=CHATBOT RAG PLATFORM
# SEPAY_BANK_CODE=VCB
# SEPAY_BANK_DISPLAY_NAME=Vietcombank
