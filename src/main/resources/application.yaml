spring:
  application:
    name: chatbot-rag-be
  
  profiles:
    include: sepay, gemini-local  # Added gemini-local for RAG

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/chatbot_db}  # Port 5433 for Docker PostgreSQL
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}  # Docker PostgreSQL password
    driver-class-name: org.postgresql.Driver

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:anhphamle2002@gmail.com}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            trust: "*"
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

app:
  mail:
    from: ${MAIL_FROM:${MAIL_USERNAME:}}
    from-name: ${MAIL_FROM_NAME:Chatbot RAG Platform}
  server-url: ${APP_SERVER_URL:http://localhost:8080}

  sql:
    init:
      mode: ${SQL_INIT_MODE:always}
    # old default: never
    # mode: never

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    defer-datasource-initialization: true 
    hibernate:
      # ddl-auto: none
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # PHẢI ĐẶT Ở ĐÂY (THỤT VÀO 2 DẤU CÁCH SO VỚI SPRING)
  autoconfigure:
    exclude:
      - org.springframework.ai.model.google.genai.autoconfigure.chat.GoogleGenAiChatAutoConfiguration
      - org.springframework.ai.model.google.genai.autoconfigure.embedding.GoogleGenAiEmbeddingAutoConfiguration

# Server configuration for proxy support (ngrok)
server:
  forward-headers-strategy: framework
  port: 8080

management:
  health:
    mail:
      enabled: false

# MinIO Configuration (S3-compatible object storage)
minio:
  enabled: true  # Đã có Docker, enable MinIO
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin123}
  bucket-name: ${MINIO_BUCKET:chatbot-documents}
  public-endpoint: ${MINIO_PUBLIC_ENDPOINT:http://localhost:9000}

jwt:
  secret: ${JWT_SECRET:GSP26SE114_Super_Secret_Key_For_Internal_Chatbot_RAG_2026_FPTU}
  expiration: 86400000
  refreshExpiration: 604800000
